name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install documentation dependencies
        if: matrix.python-version == '3.12'
        run: pip install -r docs/requirements.txt

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: python -m pytest -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: python -m pytest -q --cov=winappaudiorouter --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Build package
        run: python -m build

      - name: Build documentation
        if: matrix.python-version == '3.12'
        run: python -m sphinx -W --keep-going -b html docs docs/_build/html

      - name: Trigger Read the Docs build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python-version == '3.12'
        env:
          RTD_API_KEY: ${{ secrets.RTD_API_KEY }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Token $env:RTD_API_KEY"
            "Content-Type" = "application/json"
          }
          Invoke-RestMethod `
            -Method Post `
            -Uri "https://app.readthedocs.org/api/v3/projects/winappaudiorouter/versions/latest/builds/" `
            -Headers $headers `
            -Body "{}"

      - name: Validate package metadata
        run: python -m twine check dist\*.whl dist\*.tar.gz
